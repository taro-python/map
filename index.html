<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MIL Tactical Radar</title>
    <script src="https://unpkg.com/mgrs@1.0.0/dist/mgrs.min.js"></script>
    <style>
        :root {
            --radar-green: #2ecc71;
            --radar-bg: #001a00;
            --grid-line: rgba(46, 204, 113, 0.4);
            --text-color: #ffffff;
            --accent-red: #ff3333;
        }

        body {
            margin: 0; padding: 0;
            background-color: #050505;
            color: var(--text-color);
            font-family: 'Consolas', 'Monaco', monospace;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden;
        }

        /* 上部ステータス */
        #status-bar {
            width: 90%; margin-top: 10px; font-size: 12px;
            display: flex; justify-content: space-between; color: var(--radar-green);
        }

        /* レーダーコンテナ */
        #radar-container {
            position: relative; width: 300px; height: 300px; margin: 40px 0;
        }

        #compass-rose {
            position: absolute; width: 100%; height: 100%; border-radius: 50%;
            transition: transform 0.1s linear; z-index: 5;
        }

        .direction {
            position: absolute; font-size: 20px; font-weight: bold; color: var(--radar-green);
        }
        .n { top: -25px; left: 50%; transform: translateX(-50%); color: var(--accent-red); }
        .s { bottom: -25px; left: 50%; transform: translateX(-50%); }
        .e { right: -25px; top: 50%; transform: translateY(-50%); }
        .w { left: -25px; top: 50%; transform: translateY(-50%); }

        #radar-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%; background-color: var(--radar-bg);
            border: 3px solid var(--radar-green);
            box-shadow: inset 0 0 20px rgba(0,255,0,0.2); overflow: hidden;
        }

        .grid-lines {
            width: 200%; height: 200%; position: absolute; top: -50%; left: -50%;
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 40px 40px; background-position: center center;
        }

        #self-marker {
            position: absolute; top: 50%; left: 50%; width: 12px; height: 12px;
            background: var(--accent-red); border: 2px solid #fff; border-radius: 50%;
            transform: translate(-50%, -50%); z-index: 10; box-shadow: 0 0 8px var(--accent-red);
        }

        /* 下部パネル */
        #info-panel {
            width: 90%; background: rgba(0, 40, 0, 0.3);
            border: 1px solid var(--radar-green); border-radius: 10px;
            padding: 15px; box-sizing: border-box;
        }

        .data-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .val { font-weight: bold; color: #fff; font-size: 1.1rem; }
        
        /* 他機リストエリア */
        #peer-list {
            margin-top: 10px; border-top: 1px dotted var(--radar-green);
            padding-top: 10px; font-size: 12px; max-height: 80px; overflow-y: auto;
        }
        .peer-item { color: #aaa; margin-bottom: 4px; }
        .peer-active { color: var(--radar-green); font-weight: bold; }

        button {
            width: 100%; padding: 10px; background: var(--radar-green);
            border: none; font-weight: bold; border-radius: 5px; margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="status-bar">
        <span>自機ID: <span id="my-id">---</span></span>
        <span>追跡中: <span id="target-id">---</span></span>
    </div>

    <div id="radar-container">
        <div id="compass-rose">
            <div class="direction n">N</div>
            <div class="direction e">E</div>
            <div class="direction s">S</div>
            <div class="direction w">W</div>
        </div>
        <div id="radar-screen">
            <div class="grid-lines" id="grid"></div>
            <div id="self-marker"></div>
        </div>
    </div>

    <div id="info-panel">
        <div class="data-row">
            <span>MGRS:</span>
            <span id="mgrs-display" class="val">取得中...</span>
        </div>
        <div class="data-row">
            <span>HEADING:</span>
            <span id="mil-display" class="val">0000 mil</span>
        </div>

        <div id="peer-list">
            <div class="label" style="font-size: 10px; margin-bottom: 5px;">加入中の他機:</div>
            <div id="peers">待機中...</div>
        </div>
        
        <button onclick="initSystem()">START SYSTEM</button>
    </div>

    <script>
        // ミル変換 (6400ミル)
        function degToMil(deg) {
            let mil = Math.round(deg * (6400 / 360));
            return mil.toString().padStart(4, '0');
        }

        // MGRS整形
        function formatMGRS(str) {
            if(!str) return "ERROR";
            return str.replace(/^(\d{2}[A-Z])([A-Z]{2})(\d+)/, (m, g, s, n) => {
                const h = n.length / 2;
                return `${g} ${s} ${n.substr(0, h)} ${n.substr(h)}`;
            });
        }

        function initSystem() {
            // 方位許可
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(state => {
                    if (state === 'granted') window.addEventListener('deviceorientation', updateHeading, true);
                });
            } else {
                window.addEventListener('deviceorientation', updateHeading, true);
            }

            // GPS開始
            navigator.geolocation.watchPosition(pos => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                try {
                    const code = mgrs.forward([lon, lat]);
                    document.getElementById('mgrs-display').innerText = formatMGRS(code);
                } catch(e) {
                    document.getElementById('mgrs-display').innerText = "CALC ERROR";
                }
            }, err => {
                document.getElementById('mgrs-display').innerText = "GPS OFF";
            }, { enableHighAccuracy: true });

            // ダミーの他機リスト（既存サイトのロジックをここに繋げてください）
            document.getElementById('peers').innerHTML = '<div class="peer-item peer-active">UNIT_02: 54SUE12345678 (3200mil)</div>';
        }

        function updateHeading(event) {
            let heading = event.webkitCompassHeading || (360 - event.alpha);
            if (heading === undefined) return;

            // ミル表示更新
            document.getElementById('mil-display').innerText = `${degToMil(heading)} mil`;

            // 回転処理
            document.getElementById('compass-rose').style.transform = `rotate(${-heading}deg)`;
            document.getElementById('grid').style.transform = `rotate(${-heading}deg)`;
        }
    </script>
</body>
</html>
