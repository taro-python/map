<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MIL ユニット・ロケーター</title>
    <style>
        body { margin: 0; padding: 0; background-color: #0a0a0a; color: #00FF00; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        #hud { position: absolute; top: 15px; left: 15px; font-size: 12px; z-index: 10; pointer-events: none; line-height: 1.6; text-shadow: 0 0 5px #00FF00; }
        .label { color: rgba(0, 255, 0, 0.6); font-size: 10px; margin-right: 5px; }

        #compass-container { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 280px; height: 280px; border: 1px solid #00FF00; border-radius: 50%; box-shadow: inset 0 0 20px rgba(0, 255, 0, 0.1); }
        .axis { position: absolute; background-color: rgba(0, 255, 0, 0.2); }
        .axis.v { top: 0; left: 50%; width: 1px; height: 100%; }
        .axis.h { top: 50%; left: 0; width: 100%; height: 1px; }

        #target-marker-wrapper { position: absolute; width: 100%; height: 100%; transform-origin: center center; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        #target-marker { position: absolute; top: -12px; left: calc(50% - 12px); width: 24px; height: 24px; background-color: #FF0000; border: 2px solid #FFF; border-radius: 50%; box-shadow: 0 0 15px #FF0000; display: none; }
        #target-marker::after { content: '目標'; position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-size: 10px; font-weight: bold; white-space: nowrap; }

        #dist-display { position: absolute; bottom: 60px; width: 100%; text-align: center; font-size: 40px; font-weight: bold; letter-spacing: 2px; text-shadow: 0 0 15px #00FF00; }
        #dist-unit { font-size: 18px; margin-left: 5px; }
        #status-msg { position: absolute; bottom: 30px; width: 100%; text-align: center; font-size: 12px; color: rgba(0, 255, 0, 0.5); }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/mgrs@1.0.0/dist/mgrs.min.js"></script>
</head>
<body>

    <div id="hud">
        <span class="label">自機ID:</span> <span id="display-id">---</span><br>
        <span class="label">追跡中:</span> <span id="tgt-id">---</span><br>
        <span class="label">MGRS :</span> <span id="my-mgrs">取得中...</span>
    </div>

    <div id="compass-container">
        <div class="axis v"></div>
        <div class="axis h"></div>
        <div id="target-marker-wrapper">
            <div id="target-marker"></div>
        </div>
    </div>

    <div id="dist-display">---<span id="dist-unit">m</span></div>
    <div id="status-msg">GPS信号待機中...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDsART06pbzX4ZSiak1QSRBa-a9vjXJI2U",
            authDomain: "mil-unit-locator.firebaseapp.com",
            databaseURL: "https://mil-unit-locator-default-rtdb.firebaseio.com",
            projectId: "mil-unit-locator",
            storageBucket: "mil-unit-locator.firebasestorage.app",
            messagingSenderId: "909459789384",
            appId: "1:909459789384:web:3cc8eaf86bea210dcbaa7d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const urlParams = new URLSearchParams(window.location.search);
        const myId = urlParams.get('id') || 'user1';
        const targetId = (myId === 'user1') ? 'user2' : 'user1';

        document.getElementById('display-id').innerText = myId.toUpperCase();
        document.getElementById('tgt-id').innerText = targetId.toUpperCase();

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371000; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function calculateBearing(lat1, lon1, lat2, lon2) {
            const y = Math.sin((lon2-lon1) * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180);
            const x = Math.cos(lat1 * Math.PI / 180) * Math.sin(lat2 * Math.PI / 180) - Math.sin(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.cos((lon2-lon1) * Math.PI / 180);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }

        if (navigator.geolocation) {
            navigator.geolocation.watchPosition((position) => {
                const myLat = position.coords.latitude;
                const myLng = position.coords.longitude;
                
                // MGRSに変換
                try {
                    const mgrsStr = mgrs.forward([myLng, myLat]);
                    document.getElementById('my-mgrs').innerText = mgrsStr;
                } catch(e) {
                    document.getElementById('my-mgrs').innerText = "変換エラー";
                }

                document.getElementById('status-msg').innerText = "オンライン: 位置情報更新中";

                set(ref(db, 'locations/' + myId), {
                    lat: myLat,
                    lng: myLng,
                    timestamp: Date.now()
                });

                onValue(ref(db, 'locations/' + targetId), (snapshot) => {
                    const data = snapshot.val();
                    if (data && data.lat) {
                        const dist = calculateDistance(myLat, myLng, data.lat, data.lng);
                        const bearing = calculateBearing(myLat, myLng, data.lat, data.lng);

                        if (dist < 10) {
                            document.getElementById('dist-display').innerHTML = '至近距離';
                            document.getElementById('target-marker').style.display = 'none';
                        } else {
                            if (dist > 1000) {
                                document.getElementById('dist-display').innerHTML = (dist/1000).toFixed(2) + '<span id="dist-unit">km</span>';
                            } else {
                                document.getElementById('dist-display').innerHTML = Math.round(dist) + '<span id="dist-unit">m</span>';
                            }
                            document.getElementById('target-marker-wrapper').style.transform = `rotate(${bearing}deg)`;
                            document.getElementById('target-marker').style.display = 'block';
                        }
                    }
                });

            }, (error) => {
                document.getElementById('status-msg').innerText = "GPSエラー: " + error.message;
            }, {
                enableHighAccuracy: true,
                maximumAge: 0
            });
        }
    </script>
</body>
</html>
