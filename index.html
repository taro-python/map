<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MIL Tactical Radar + Chat</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/mgrs@1.0.0/dist/mgrs.min.js"></script>

    <style>
        :root { --radar-green: #2ecc71; --bg: #050505; --accent-red: #ff3333; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Consolas', monospace; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        
        #radar-container { position: relative; width: 280px; height: 280px; margin-top: 20px; flex-shrink: 0; }
        #compass-rose { position: absolute; width: 100%; height: 100%; z-index: 5; }
        .direction { position: absolute; font-size: 20px; font-weight: bold; color: var(--radar-green); }
        .n { top: -25px; left: 50%; transform: translateX(-50%); color: var(--accent-red); }
        .s { bottom: -25px; left: 50%; transform: translateX(-50%); }
        .e { right: -25px; top: 50%; transform: translateY(-50%); }
        .w { left: -25px; top: 50%; transform: translateY(-50%); }

        #radar-screen { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: #001a00; border: 2px solid var(--radar-green); overflow: hidden; }
        .grid-lines { width: 200%; height: 200%; position: absolute; top: -50%; left: -50%; background-image: linear-gradient(rgba(46,204,113,0.3) 1px, transparent 1px), linear-gradient(90deg, rgba(46,204,113,0.3) 1px, transparent 1px); background-size: 35px 35px; }
        #self-marker { position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; background: var(--accent-red); border: 2px solid #fff; border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; }
        .peer-dot { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; background: #ffff00; border-radius: 50%; border: 1px solid white; z-index: 8; transform: translate(-50%, -50%); }

        /* チャット・リストエリア */
        #bottom-panel { width: 95%; flex-grow: 1; display: flex; flex-direction: column; gap: 10px; margin-top: 15px; margin-bottom: 10px; overflow: hidden; }
        
        #chat-area { flex: 1; background: rgba(0,20,0,0.6); border: 1px solid var(--radar-green); border-radius: 5px; display: flex; flex-direction: column; overflow: hidden; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 5px; font-size: 12px; }
        .msg { margin-bottom: 4px; border-bottom: 1px solid #111; padding-bottom: 2px; }
        .msg-id { color: var(--radar-green); font-weight: bold; }
        
        #chat-input-row { display: flex; border-top: 1px solid var(--radar-green); }
        #chat-input { flex: 1; background: transparent; border: none; color: white; padding: 8px; font-family: monospace; outline: none; }
        #send-btn { background: var(--radar-green); border: none; padding: 0 15px; font-weight: bold; cursor: pointer; }

        #peer-list { height: 60px; background: rgba(255,255,255,0.05); border-radius: 5px; overflow-y: auto; padding: 5px; font-size: 11px; }
        .peer-row { display: flex; justify-content: space-between; color: #aaa; }

        button#start-btn { width: 90%; padding: 15px; background: var(--radar-green); border: none; font-weight: bold; border-radius: 5px; margin: 10px 0; }
    </style>
</head>
<body>

<div id="radar-container">
    <div id="compass-rose"><div class="direction n">N</div><div class="direction e">E</div><div class="direction s">S</div><div class="direction w">W</div></div>
    <div id="radar-screen"><div class="grid-lines" id="grid"></div><div id="self-marker"></div></div>
</div>

<div style="font-size: 11px; margin-top: 5px; color: var(--radar-green);">
    MGRS: <span id="mgrs-display" style="color:white">---</span> | ID: <span id="my-id-display" style="color:white">---</span>
</div>

<div id="bottom-panel">
    <div id="chat-area">
        <div id="chat-messages"></div>
        <div id="chat-input-row">
            <input type="text" id="chat-input" placeholder="メッセージ入力..." maxlength="50">
            <button id="send-btn" onclick="sendChat()">送信</button>
        </div>
    </div>
    <div id="peer-list">
        <div style="color: #666;">他機リスト待機中...</div>
    </div>
</div>

<button id="start-btn" onclick="startSystem()">システム起動</button>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDsART06pbzX4ZSiak1QSRBa-a9vjXJI2U",
        authDomain: "mil-unit-locator.firebaseapp.com",
        databaseURL: "https://mil-unit-locator-default-rtdb.firebaseio.com",
        projectId: "mil-unit-locator",
        storageBucket: "mil-unit-locator.firebasestorage.app",
        messagingSenderId: "909459789384",
        appId: "1:909459789384:web:3cc8eaf86bea210dcbaa7d"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const myId = "UNIT_" + Math.random().toString(36).substr(2, 4).toUpperCase();
    document.getElementById('my-id-display').innerText = myId;
    let myCoords = null;

    function startSystem() {
        document.getElementById('start-btn').style.display = 'none';
        
        // 方位・GPS許可
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission().then(res => {
                if(res === 'granted') window.addEventListener('deviceorientation', handleOrientation, true);
            });
        } else {
            window.addEventListener('deviceorientation', handleOrientation, true);
        }

        navigator.geolocation.watchPosition(updatePos, null, { enableHighAccuracy: true });

        // 他機監視
        db.ref('locations').on('value', snap => updateRadar(snap.val()));

        // チャット監視
        db.ref('chat').limitToLast(15).on('child_added', snap => {
            const data = snap.val();
            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg';
            msgDiv.innerHTML = `<span class="msg-id">${data.id}:</span> ${data.text}`;
            const container = document.getElementById('chat-messages');
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        });
    }

    function sendChat() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text) return;
        db.ref('chat').push({ id: myId, text: text, time: Date.now() });
        input.value = "";
    }

    // Enterキーでも送信可能にする
    document.getElementById('chat-input').addEventListener('keypress', e => {
        if(e.key === 'Enter') sendChat();
    });

    function updatePos(pos) {
        myCoords = { lat: pos.coords.latitude, lon: pos.coords.longitude };
        db.ref('locations/' + myId).set({ lat: myCoords.lat, lon: myCoords.lon, timestamp: firebase.database.ServerValue.TIMESTAMP });
        try {
            document.getElementById('mgrs-display').innerText = mgrs.forward([myCoords.lon, myCoords.lat]);
        } catch(e) {}
    }

    function handleOrientation(e) {
        let heading = e.webkitCompassHeading || (360 - e.alpha);
        document.getElementById('compass-rose').style.transform = `rotate(${-heading}deg)`;
        document.getElementById('grid').style.transform = `rotate(${-heading}deg)`;
    }

    function updateRadar(allData) {
        if (!allData || !myCoords) return;
        const screen = document.getElementById('radar-screen');
        const list = document.getElementById('peer-list');
        list.innerHTML = "";
        const now = Date.now();

        Object.keys(allData).forEach(id => {
            if (id === myId) return;
            const p = allData[id];
            if (now - p.timestamp > 120000) return;

            const dLat = (p.lat - myCoords.lat) * 111320;
            const dLon = (p.lon - myCoords.lon) * (111320 * Math.cos(myCoords.lat * Math.PI / 180));
            const dist = Math.round(Math.sqrt(dLat**2 + dLon**2));

            let dot = document.getElementById('dot-' + id);
            if (!dot) {
                dot = document.createElement('div'); dot.id = 'dot-' + id; dot.className = 'peer-dot';
                screen.appendChild(dot);
            }
            dot.style.transform = `translate(calc(-50% + ${dLon * 0.5}px), calc(-50% + ${-dLat * 0.5}px))`;

            const row = document.createElement('div');
            row.className = 'peer-row';
            row.innerHTML = `<span>${id}</span><span>${dist}m</span>`;
            list.appendChild(row);
        });
    }
</script>
</body>
</html>
