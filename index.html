<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MIL Tactical Radar Fix</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/mgrs@1.0.0/dist/mgrs.min.js"></script>

    <style>
        :root { --radar-green: #2ecc71; --bg: #050505; --accent-red: #ff3333; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Consolas', monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow: hidden; }
        
        #radar-container { position: relative; width: 300px; height: 300px; margin-top: 40px; flex-shrink: 0; }
        #compass-rose { position: absolute; width: 100%; height: 100%; z-index: 5; }
        .direction { position: absolute; font-size: 24px; font-weight: bold; color: var(--radar-green); }
        .n { top: -30px; left: 50%; transform: translateX(-50%); color: var(--accent-red); }
        .s { bottom: -30px; left: 50%; transform: translateX(-50%); }
        .e { right: -30px; top: 50%; transform: translateY(-50%); }
        .w { left: -30px; top: 50%; transform: translateY(-50%); }

        #radar-screen { 
            position: absolute; width: 100%; height: 100%; border-radius: 50%; 
            background: #001a00; border: 3px solid var(--radar-green); overflow: hidden; 
        }
        .grid-lines { 
            width: 200%; height: 200%; position: absolute; top: -50%; left: -50%;
            background-image: linear-gradient(rgba(46,204,113,0.3) 1px, transparent 1px), linear-gradient(90deg, rgba(46,204,113,0.3) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        #self-marker { position: absolute; top: 50%; left: 50%; width: 14px; height: 14px; background: var(--accent-red); border: 2px solid #fff; border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; }
        .peer-dot { position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; background: #ffff00; border-radius: 50%; border: 1px solid white; z-index: 8; transition: all 0.3s ease-out; }

        #info-panel { width: 90%; margin-top: 20px; padding: 12px; border: 1px solid var(--radar-green); border-radius: 10px; background: rgba(0,30,0,0.4); }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .val { font-weight: bold; font-size: 1.1rem; }

        #peer-list-container { width: 90%; margin-top: 10px; overflow-y: auto; flex-grow: 1; }
        .peer-row { display: flex; justify-content: space-between; font-size: 13px; background: rgba(255,255,255,0.05); padding: 6px 10px; border-radius: 4px; margin-bottom: 4px; border-left: 3px solid #ffff00; }

        button { width: 90%; padding: 15px; background: var(--radar-green); border: none; font-weight: bold; border-radius: 5px; margin: 10px 0; font-size: 1.1rem; }
    </style>
</head>
<body>

<div id="radar-container">
    <div id="compass-rose">
        <div class="direction n">N</div><div class="direction e">E</div>
        <div class="direction s">S</div><div class="direction w">W</div>
    </div>
    <div id="radar-screen">
        <div class="grid-lines" id="grid"></div>
        <div id="self-marker"></div>
    </div>
</div>

<div id="info-panel">
    <div class="data-row"><span>MGRS:</span> <span id="mgrs-display" class="val" style="color: #ffaa00;">GPS待機中...</span></div>
    <div class="data-row"><span>HEADING:</span> <span id="mil-display" class="val">0000 mil</span></div>
</div>

<div id="peer-list-container" id="peers">
    <div id="peer-list-inner"></div>
</div>

<button id="start-btn" onclick="startSystem()">システム起動</button>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDsART06pbzX4ZSiak1QSRBa-a9vjXJI2U",
        authDomain: "mil-unit-locator.firebaseapp.com",
        databaseURL: "https://mil-unit-locator-default-rtdb.firebaseio.com",
        projectId: "mil-unit-locator",
        storageBucket: "mil-unit-locator.firebasestorage.app",
        messagingSenderId: "909459789384",
        appId: "1:909459789384:web:3cc8eaf86bea210dcbaa7d"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const myId = "UNIT_" + Math.random().toString(36).substr(2, 4).toUpperCase();
    let myCoords = null;
    let lastRawHeading = 0;

    function startSystem() {
        document.getElementById('start-btn').style.display = 'none';
        
        // 方位・GPS許可
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission().then(res => {
                if(res === 'granted') window.addEventListener('deviceorientation', handleOrientation, true);
            });
        } else {
            window.addEventListener('deviceorientation', handleOrientation, true);
        }

        const gpsOptions = { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 };
        navigator.geolocation.watchPosition(updateMyLocation, handleGPSError, gpsOptions);

        db.ref('locations').on('value', snapshot => {
            updateRadar(snapshot.val());
        });
    }

    function updateMyLocation(pos) {
        myCoords = { lat: pos.coords.latitude, lon: pos.coords.longitude };
        
        // Firebase送信
        db.ref('locations/' + myId).set({
            lat: myCoords.lat, lon: myCoords.lon,
            timestamp: firebase.database.ServerValue.TIMESTAMP
        });

        // MGRS表示
        try {
            const code = mgrs.forward([myCoords.lon, myCoords.lat]);
            const display = document.getElementById('mgrs-display');
            display.innerText = formatMGRS(code);
            display.style.color = "#fff";
        } catch(e) { 
            document.getElementById('mgrs-display').innerText = "CALC ERROR"; 
        }
    }

    function handleGPSError(err) {
        let msg = "GPS ERROR";
        if (err.code === 1) msg = "位置情報の許可が必要";
        if (err.code === 3) msg = "測位タイムアウト";
        document.getElementById('mgrs-display').innerText = msg;
    }

    function handleOrientation(e) {
        lastRawHeading = e.webkitCompassHeading || (360 - e.alpha);
        if (lastRawHeading === undefined) return;
        const mil = Math.round(lastRawHeading * (6400 / 360));
        document.getElementById('mil-display').innerText = mil.toString().padStart(4, '0') + " mil";
        document.getElementById('compass-rose').style.transform = `rotate(${-lastRawHeading}deg)`;
        document.getElementById('grid').style.transform = `rotate(${-lastRawHeading}deg)`;
    }

    function updateRadar(allData) {
        if (!allData || !myCoords) return;
        const screen = document.getElementById('radar-screen');
        const listInner = document.getElementById('peer-list-inner');
        listInner.innerHTML = "";
        const now = Date.now();

        Object.keys(allData).forEach(id => {
            if (id === myId) return;
            const peer = allData[id];
            if (now - peer.timestamp > 120000) { // 2分以上前のデータは削除
                const oldDot = document.getElementById('dot-' + id);
                if (oldDot) oldDot.remove();
                return;
            }

            // 距離計算（メートル）
            const dLat = (peer.lat - myCoords.lat) * 111320;
            const dLon = (peer.lon - myCoords.lon) * (111320 * Math.cos(myCoords.lat * Math.PI / 180));
            const dist = Math.round(Math.sqrt(dLat*dLat + dLon*dLon));

            // ドットの描画
            let dot = document.getElementById('dot-' + id);
            if (!dot) {
                dot = document.createElement('div');
                dot.id = 'dot-' + id;
                dot.className = 'peer-dot';
                screen.appendChild(dot);
            }
            // 縮尺 1m = 0.5px (半径150px = 300m)
            const scale = 0.5;
            const x = dLon * scale;
            const y = -dLat * scale;
            dot.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;

            // リストの描画
            const row = document.createElement('div');
            row.className = 'peer-row';
            row.innerHTML = `<span>${id}</span><span style="font-weight:bold; color:#ffff00;">${dist}m</span>`;
            listInner.appendChild(row);
        });
    }

    function formatMGRS(str) {
        return str.replace(/^(\d{2}[A-Z])([A-Z]{2})(\d+)/, (m, g, s, n) => {
            const h = n.length / 2;
            return `${g} ${s} ${n.substr(0, h)} ${n.substr(h)}`;
        });
    }
</script>
</body>
</html>
