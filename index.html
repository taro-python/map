<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>タクティカル・レーダー</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/mgrs@1.0.0/dist/mgrs.min.js"></script>

    <style>
        :root { --radar-green: #2ecc71; --bg: #050505; --accent-red: #ff3333; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Hiragino Kaku Gothic ProN', sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        
        #radar-container { position: relative; width: 320px; height: 320px; margin-top: 40px; }
        #compass-rose { position: absolute; width: 100%; height: 100%; transition: transform 0.1s linear; z-index: 5; }
        .direction { position: absolute; font-size: 22px; font-weight: bold; color: var(--radar-green); text-shadow: 0 0 8px var(--radar-green); }
        .n { top: -30px; left: 50%; transform: translateX(-50%); color: var(--accent-red); }
        .s { bottom: -30px; left: 50%; transform: translateX(-50%); }
        .e { right: -30px; top: 50%; transform: translateY(-50%); }
        .w { left: -30px; top: 50%; transform: translateY(-50%); }

        #radar-screen { 
            position: absolute; width: 100%; height: 100%; border-radius: 50%; 
            background: #001a00; border: 3px solid var(--radar-green); overflow: hidden; 
            box-shadow: inset 0 0 20px rgba(0,255,0,0.3);
        }
        .grid-lines { 
            width: 200%; height: 200%; position: absolute; top: -50%; left: -50%;
            background-image: linear-gradient(rgba(46,204,113,0.3) 1px, transparent 1px), linear-gradient(90deg, rgba(46,204,113,0.3) 1px, transparent 1px);
            background-size: 40px 40px; background-position: center center;
        }

        #self-marker { position: absolute; top: 50%; left: 50%; width: 14px; height: 14px; background: var(--accent-red); border: 2px solid #fff; border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; box-shadow: 0 0 10px var(--accent-red); }
        
        /* 他機ドットと距離ラベル */
        .peer-wrapper { position: absolute; top: 50%; left: 50%; transition: all 0.5s ease-out; z-index: 8; pointer-events: none; }
        .peer-dot { width: 12px; height: 12px; background: #ffff00; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 8px #ffff00; transform: translate(-50%, -50%); }
        .peer-label { position: absolute; top: 10px; left: 10px; font-size: 10px; color: #ffff00; white-space: nowrap; font-weight: bold; text-shadow: 1px 1px 2px black; }

        #info-panel { width: 90%; margin-top: 30px; padding: 15px; border: 1px solid var(--radar-green); border-radius: 10px; background: rgba(0,30,0,0.4); box-sizing: border-box; }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.9rem; }
        .val { font-weight: bold; color: #fff; font-size: 1.1rem; font-family: monospace; }
        button { width: 100%; padding: 12px; background: var(--radar-green); border: none; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 10px; font-size: 1rem; }
    </style>
</head>
<body>

<div id="radar-container">
    <div id="compass-rose"><div class="direction n">北</div><div class="direction e">東</div><div class="direction s">南</div><div class="direction w">西</div></div>
    <div id="radar-screen">
        <div class="grid-lines" id="grid"></div>
        <div id="self-marker"></div>
    </div>
</div>

<div id="info-panel">
    <div class="data-row"><span>現在地 (MGRS):</span> <span id="mgrs-display" class="val">測位中...</span></div>
    <div class="data-row"><span>進行方位 (ミル):</span> <span id="mil-display" class="val">0000 mil</span></div>
    <div id="peer-status" style="font-size: 11px; color: var(--radar-green); margin-top: 5px; border-top: 1px dotted #444; padding-top: 5px;">システム待機中...</div>
    <button id="start-btn" onclick="startSystem()">システム起動</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDsART06pbzX4ZSiak1QSRBa-a9vjXJI2U",
        authDomain: "mil-unit-locator.firebaseapp.com",
        databaseURL: "https://mil-unit-locator-default-rtdb.firebaseio.com",
        projectId: "mil-unit-locator",
        storageBucket: "mil-unit-locator.firebasestorage.app",
        messagingSenderId: "909459789384",
        appId: "1:909459789384:web:3cc8eaf86bea210dcbaa7d"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const myId = "UNIT_" + Math.random().toString(36).substr(2, 4).toUpperCase();
    let myCoords = { lat: 0, lon: 0 };

    function startSystem() {
        document.getElementById('start-btn').style.display = 'none';
        
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission().then(res => {
                if(res === 'granted') window.addEventListener('deviceorientation', handleOrientation, true);
            });
        } else {
            window.addEventListener('deviceorientation', handleOrientation, true);
        }

        navigator.geolocation.watchPosition(pos => {
            myCoords = { lat: pos.coords.latitude, lon: pos.coords.longitude };
            
            db.ref('locations/' + myId).set({
                lat: myCoords.lat,
                lon: myCoords.lon,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });

            try {
                const code = mgrs.forward([myCoords.lon, myCoords.lat]);
                document.getElementById('mgrs-display').innerText = formatMGRS(code);
            } catch(e) {}
        }, null, { enableHighAccuracy: true });

        db.ref('locations').on('value', snapshot => {
            updatePeerMarkers(snapshot.val());
        });

        document.getElementById('peer-status').innerText = `自機ID: ${myId} | スキャン中...`;
    }

    function handleOrientation(e) {
        let heading = e.webkitCompassHeading || (360 - e.alpha);
        if (heading === undefined) return;

        const mil = Math.round(heading * (6400 / 360));
        document.getElementById('mil-display').innerText = mil.toString().padStart(4, '0') + " mil";
        
        document.getElementById('compass-rose').style.transform = `rotate(${-heading}deg)`;
        document.getElementById('grid').style.transform = `rotate(${-heading}deg)`;
    }

    function updatePeerMarkers(allData) {
        if (!allData || !myCoords.lat) return;
        const screen = document.getElementById('radar-screen');
        const now = Date.now();

        Object.keys(allData).forEach(id => {
            if (id === myId) return;
            
            const peer = allData[id];
            if (now - peer.timestamp > 180000) {
                const old = document.getElementById('peer-wrap-' + id);
                if (old) old.remove();
                return;
            }

            let wrapper = document.getElementById('peer-wrap-' + id);
            if (!wrapper) {
                wrapper = document.createElement('div');
                wrapper.id = 'peer-wrap-' + id;
                wrapper.className = 'peer-wrapper';
                wrapper.innerHTML = `<div class="peer-dot"></div><div class="peer-label" id="dist-${id}">---m</div>`;
                screen.appendChild(wrapper);
            }

            const dLat = (peer.lat - myCoords.lat) * 111320;
            const dLon = (peer.lon - myCoords.lon) * (111320 * Math.cos(myCoords.lat * Math.PI / 180));
            
            // 距離の計算
            const distance = Math.sqrt(dLat*dLat + dLon*dLon);
            document.getElementById(`dist-${id}`).innerText = id + " [" + Math.round(distance) + "m]";

            const scale = 0.5; // 1m = 0.5px (レーダー半径150pxで300m)
            const x = dLon * scale;
            const y = -dLat * scale;

            wrapper.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
        });
    }

    function formatMGRS(str) {
        return str.replace(/^(\d{2}[A-Z])([A-Z]{2})(\d+)/, (m, g, s, n) => {
            const h = n.length / 2;
            return `${g} ${s} ${n.substr(0, h)} ${n.substr(h)}`;
        });
    }
</script>
</body>
</html>
