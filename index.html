<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical Grid Radar</title>
    <script src="https://unpkg.com/mgrs@1.0.0/dist/mgrs.min.js"></script>
    <style>
        :root {
            --radar-green: #2ecc71;
            --radar-bg: #001a00;
            --grid-line: rgba(46, 204, 113, 0.4);
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* レーダー全体のコンテナ */
        #radar-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin-bottom: 20px;
        }

        /* 外周のNSEW（コンパス） */
        #compass-rose {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transition: transform 0.1s ease-out;
            z-index: 5;
        }

        .direction {
            position: absolute;
            font-size: 24px;
            font-weight: bold;
            color: var(--radar-green);
            text-shadow: 0 0 10px var(--radar-green);
        }

        .n { top: -30px; left: 50%; transform: translateX(-50%); color: #ff3333; }
        .s { bottom: -30px; left: 50%; transform: translateX(-50%); }
        .e { right: -30px; top: 50%; transform: translateY(-50%); }
        .w { left: -30px; top: 50%; transform: translateY(-50%); }

        /* 碁盤の目（レーダー画面） */
        #radar-screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border-radius: 50%;
            background-color: var(--radar-bg);
            border: 4px solid var(--radar-green);
            box-shadow: inset 0 0 30px rgba(0, 255, 0, 0.3), 0 0 15px rgba(0, 255, 0, 0.2);
            overflow: hidden;
            z-index: 2;
        }

        /* 網目（碁盤の目） */
        .grid-lines {
            width: 200%; height: 200%;
            position: absolute;
            top: -50%; left: -50%;
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center center;
            /* 回転時はここを回す */
            transition: transform 0.1s linear;
        }

        /* 中心：自分マーク */
        #self-marker {
            position: absolute;
            top: 50%; left: 50%;
            width: 14px; height: 14px;
            background-color: #ff0000;
            border: 2px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            box-shadow: 0 0 10px #ff0000;
        }

        /* 情報表示エリア */
        #info-panel {
            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--radar-green);
            width: 280px;
        }

        .label { color: var(--radar-green); font-size: 0.8rem; margin-bottom: 4px; }
        .value { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; letter-spacing: 1px; }

        button {
            padding: 10px 20px;
            background: var(--radar-green);
            border: none;
            color: black;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="radar-container">
        <div id="compass-rose">
            <div class="direction n">N</div>
            <div class="direction e">E</div>
            <div class="direction s">S</div>
            <div class="direction w">W</div>
        </div>
        
        <div id="radar-screen">
            <div class="grid-lines" id="grid"></div>
            <div id="self-marker"></div>
        </div>
    </div>

    <div id="info-panel">
        <div class="label">CURRENT MGRS</div>
        <div id="mgrs-display" class="value">WAITING GPS...</div>
        
        <div class="label">HEADING</div>
        <div id="heading-display" class="value">0°</div>
        
        <button onclick="requestPermission()">START RADAR</button>
    </div>

    <script>
        const mgrsDisplay = document.getElementById('mgrs-display');
        const headingDisplay = document.getElementById('heading-display');
        const compassRose = document.getElementById('compass-rose');
        const grid = document.getElementById('grid');

        // GPS取得
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(position => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                
                // MGRSに変換 (mgrs.jsを使用)
                try {
                    const mgrsCoord = mgrs.forward([lon, lat]);
                    mgrsDisplay.innerText = formatMGRS(mgrsCoord);
                } catch (e) {
                    mgrsDisplay.innerText = "COORD ERROR";
                }
            }, error => {
                mgrsDisplay.innerText = "GPS DISABLED";
            }, { enableHighAccuracy: true });
        }

        // MGRSを見やすく整形 (例: 54SUE12345678 -> 54S UE 1234 5678)
        function formatMGRS(str) {
            return str.replace(/^(\d{2}[A-Z])([A-Z]{2})(\d+)/, (match, gzd, sqd, num) => {
                const half = num.length / 2;
                return `${gzd} ${sqd} ${num.substr(0, half)} ${num.substr(half)}`;
            });
        }

        // 方位取得の許可（iOS対策）とイベント登録
        function requestPermission() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation, true);
                        }
                    })
                    .catch(console.error);
            } else {
                window.addEventListener('deviceorientation', handleOrientation, true);
            }
        }

        function handleOrientation(event) {
            let heading = 0;
            
            if (event.webkitCompassHeading) {
                // iOS
                heading = event.webkitCompassHeading;
            } else if (event.alpha) {
                // Android
                heading = 360 - event.alpha;
            }

            const roundedHeading = Math.round(heading);
            headingDisplay.innerText = `${roundedHeading}°`;

            // 外周と網目を回転させる (逆方向に回すことで北を固定)
            compassRose.style.transform = `rotate(${-heading}deg)`;
            grid.style.transform = `rotate(${-heading}deg)`;
        }
    </script>
</body>
</html>
