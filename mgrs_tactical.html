<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS Unit Locator</title>
    <style>
        body { margin: 0; padding: 0; background-color: #101010; color: #00FF00; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        #hudd { position: absolute; top: 10px; left: 10px; z-index: 10; font-size: 12px; text-shadow: 0 0 5px #00FF00; }
        
        /* コンパスの外枠 */
        #compass-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; height: 300px; border: 2px solid #00FF00; border-radius: 50%; box-shadow: 0 0 15px rgba(0, 255, 0, 0.5); }
        #compass-rose { position: absolute; width: 100%; height: 100%; transition: transform 0.1s linear; }
        .axis { position: absolute; background-color: rgba(0, 255, 0, 0.3); }
        .axis.v { top: 0; left: 50%; width: 1px; height: 100%; }
        .axis.h { top: 50%; left: 0; width: 100%; height: 1px; }

        /* 相手を示すマーカー */
        #target-marker { position: absolute; top: -10px; left: calc(50% - 10px); width: 20px; height: 20px; background-color: #FF0000; border-radius: 50%; box-shadow: 0 0 10px #FF0000; display: none; /* 初期は非表示 */ }
        
        #distance-display { position: absolute; bottom: 20px; width: 100%; text-align: center; font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="hudd">
        <div>MY GPS: <span id="my-coords">WAITING...</span></div>
        <div>TGT GPS: <span id="tgt-coords">NO DATA</span></div>
    </div>

    <div id="compass-container">
        <div id="compass-rose">
            <div class="axis v"></div>
            <div class="axis h"></div>
            </div>
        <div id="target-marker-wrapper" style="position:absolute; width:100%; height:100%; transform-origin: center center;">
            <div id="target-marker"></div>
        </div>
    </div>

    <div id="distance-display">--- M</div>

    <script>
        // ヒュベニの公式（距離計算）
        function getDistance(lat1, lng1, lat2, lng2) {
            const R = 6371000; // 米
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLng/2) * Math.sin(dLng/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c; 
        }

        // 方位角の計算（真北を0度とした時計回りの角度）
        function getBearing(lat1, lng1, lat2, lng2) {
            const y = Math.sin((lng2 - lng1) * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180);
            const x = Math.cos(lat1 * Math.PI / 180) * Math.sin(lat2 * Math.PI / 180) -
                      Math.sin(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.cos((lng2 - lng1) * Math.PI / 180);
            const bearing = Math.atan2(y, x) * 180 / Math.PI;
            return (bearing + 360) % 360; // 0〜360に正規化
        }

        // UIを更新する関数
        function updateUI(myLat, myLng, tgtLat, tgtLng) {
            // 距離と方位を計算
            const distance = getDistance(myLat, myLng, tgtLat, tgtLng);
            const bearing = getBearing(myLat, myLng, tgtLat, tgtLng);

            // 座標表示を更新
            document.getElementById('my-coords').innerText = `${myLat.toFixed(4)}, ${myLng.toFixed(4)}`;
            document.getElementById('tgt-coords').innerText = `${tgtLat.toFixed(4)}, ${tgtLng.toFixed(4)}`;

            // 距離表示を更新（KMに変換）
            const distStr = distance > 1000 ? (distance/1000).toFixed(2) + " KM" : Math.round(distance) + " M";
            document.getElementById('distance-display').innerText = distStr;

            // マーカーの位置（角度）を更新
            const markerWrapper = document.getElementById('target-marker-wrapper');
            const marker = document.getElementById('target-marker');
            markerWrapper.style.transform = `rotate(${bearing}deg)`; // 相手の方角へ回転
            marker.style.display = 'block'; // マーカーを表示
        }

        // GPS取得（WatchPositionで持続的に取得）
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(
                (position) => {
                    const myLat = position.coords.latitude;
                    const myLng = position.coords.longitude;

                    // 【ここにFirebaseへの送信処理が入る】
                    // firebase.database().ref('users/myID').set({ lat: myLat, lng: myLng });

                    // 【テスト用：Firebaseの代わりに、少し離れた位置（+0.005）を相手データとして仮定】
                    const dummyTgtLat = myLat + 0.005;
                    const dummyTgtLng = myLng + 0.005;
                    
                    // 【ここにFirebaseからの受信処理が入る】
                    // 相手のデータが更新されたら、その値を使ってupdateUIを呼ぶ
                    updateUI(myLat, myLng, dummyTgtLat, dummyTgtLng);
                },
                (error) => { console.error(error); },
                { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
            );
        } else {
            alert("GPSが利用できません");
        }
    </script>
</body>
</html>
